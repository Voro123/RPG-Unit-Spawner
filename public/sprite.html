<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>精灵图生成 · RPG Unit Spawner</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .hover-preview {
      position: fixed; display: none; z-index: 1000;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px;
      box-shadow: 0 8px 30px rgba(0,0,0,.45);
      pointer-events: none;
    }
    .hover-preview img {
      width: 256px; height: 256px; object-fit: contain;
      image-rendering: pixelated; display: block;
    }
    .hover-preview .pv-empty {
      width: 256px; height: 256px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); text-align: center; font-size: 14px; line-height: 1.6;
    }
    .cell.region {
      outline: 3px solid var(--accent);
      outline-offset: -3px;
      z-index: 2;
    }
  </style>
</head>
<body>
  <nav>
    <a href="/">首页</a>
    <a href="/config.html">配置</a>
    <a href="/sprite.html" class="active">精灵图生成</a>
    <a href="/walk.html">行走图生成</a>
  </nav>
  <div class="container">
    <h1>基本素材精灵图生成</h1>
    <div id="cfgWarn" class="card err" style="display:none">未配置 MINIMAX，请先到 <a href="/config.html" style="color:var(--accent)">配置页</a> 填写 API Key。</div>

    <div class="row" style="align-items:flex-end">
      <div style="flex:1;min-width:260px">
        <label>选择精灵图</label>
        <select id="sheetSel"></select>
      </div>
      <button class="ghost" id="newBtn">新建空精灵图</button>
      <button class="ghost" id="refreshBtn">刷新</button>
    </div>

    <div id="newForm" class="card" style="display:none">
      <label>名称</label>
      <input id="newName" placeholder="如：地牢道具" />
      <div class="row">
        <div style="flex:1"><label>每格像素 (cellSize)</label><input id="newCell" type="number" value="32" min="8" /></div>
        <div style="flex:1"><label>列数 (cols)</label><input id="newCols" type="number" value="8" min="1" /></div>
        <div style="flex:1"><label>行数 (rows)</label><input id="newRows" type="number" value="8" min="1" /></div>
      </div>
      <div class="row" style="margin-top:10px"><button id="createBtn">创建</button></div>
    </div>

    <div class="card">
      <div class="row" style="justify-content:space-between">
        <strong id="sheetTitle">—</strong>
        <span class="muted" id="sheetMeta"></span>
      </div>
      <div id="grid" class="grid" style="margin-top:12px"></div>
      <div class="muted" style="margin-top:8px;font-size:13px">提示：在格子上按住拖动可框选一片区域，再用「生成/替换」会把一张大图切片铺满该区域；地块适合铺满纹理，非地块适合大树、花朵、箱子等独立物体。</div>
      <div id="hoverPreview" class="hover-preview"></div>
      <div class="row" style="margin-top:10px">
        <button class="ghost" id="exportBtn">导出素材包 (PNG + meta + SKILL)</button>
        <a class="ghost button" id="skillBtn" style="text-decoration:none;padding:9px 16px;border-radius:8px;background:var(--panel2);border:1px solid var(--border)">查看绑定 Skill 文件</a>
      </div>
    </div>

    <div class="card">
      <h2 style="margin-top:0">操作格：<span id="selInfo" class="badge">未选</span></h2>

      <label>提示词（描述要生成的素材）</label>
      <textarea id="prompt" placeholder="如：小花，红色花瓣，绿色叶子，像素风"></textarea>

      <label>生成类型</label>
      <div class="row">
        <label style="margin:0"><input type="radio" name="assetKind" value="sprite" checked style="width:auto;margin-right:6px" />非地块（独立物体/道具/植物）</label>
        <label style="margin:0"><input type="radio" name="assetKind" value="tile" style="width:auto;margin-right:6px" />地块（铺满纹理/地面）</label>
      </div>
      <p class="muted" style="margin-top:6px">非地块会要求模型生成单个主体和纯色背景，但不再进行前端自动抠图/清理；地块会铺满整格并可自动沿用首格风格。</p>

      <label>参考图</label>
      <div class="row">
        <label style="margin:0"><input type="radio" name="ref" value="auto" checked style="width:auto;margin-right:6px" />自动（地块默认当前图首格 → 其他图首格；非地块不自动套首格）</label>
        <label style="margin:0"><input type="radio" name="ref" value="upload" style="width:auto;margin-right:6px" />上传</label>
        <label style="margin:0"><input type="radio" name="ref" value="sub" style="width:auto;margin-right:6px" />选本图子图</label>
        <label style="margin:0"><input type="radio" name="ref" value="none" style="width:auto;margin-right:6px" />无</label>
      </div>
      <input id="refUpload" type="file" accept="image/*" style="display:none;margin-top:8px" />
      <div id="subPick" class="row" style="display:none;margin-top:8px"></div>

      <label>随机种子（可选，留空随机）</label>
      <input id="seed" type="number" placeholder="如：12345" />

      <div class="row" style="margin-top:12px">
        <button id="genBtn">生成到选中格</button>
        <button class="ghost" id="replaceBtn">替换选中格</button>
        <button class="danger" id="delBtn">删除选中格</button>
      </div>
      <div id="opStatus" class="muted" style="margin-top:8px"></div>

      <h2>修改 Tag</h2>
      <label>该格 Tag（自动生成，可手改）</label>
      <textarea id="tagEdit"></textarea>
      <div class="row" style="margin-top:8px"><button class="ghost" id="saveTagBtn">保存 Tag</button></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let SHEET = null;
    let SEL = null;
    let REGION = null; // {c0,c1,r0,r1} 框选区域
    let REF = null; // base64 data url
    let dragging = false, dragStart = null, dragMoved = false;

    // 带缓存戳的格子图地址，确保替换后立刻刷新
    function cellUrl(id, index) {
      return `/api/sprites/${id}/cells/${index}?t=${Date.now()}`;
    }

    // 悬浮大预览图
    function showPreview(index, e) {
      const cell = SHEET.cells.find((c) => c.index === index);
      if (!cell.imageRef) return; // 空格子不悬浮
      const pv = $('hoverPreview');
      pv.innerHTML = `<img src="${cellUrl(SHEET.id, index)}" alt="">`;
      pv.style.display = 'block';
      movePreview(e);
    }
    function movePreview(e) {
      const pv = $('hoverPreview');
      if (pv.style.display === 'none') return;
      const w = pv.offsetWidth, h = pv.offsetHeight;
      let x = e.clientX + 16, y = e.clientY + 16;
      if (x + w > window.innerWidth) x = e.clientX - w - 16;
      if (y + h > window.innerHeight) y = e.clientY - h - 16;
      pv.style.left = x + 'px';
      pv.style.top = y + 'px';
    }
    function hidePreview() {
      $('hoverPreview').style.display = 'none';
    }

    function api(url, opt) { return fetch(url, opt); }

    async function loadSheets() {
      const list = await (await api('/api/sprites')).json();
      const sel = $('sheetSel');
      sel.innerHTML = list.length
        ? list.map((s) => `<option value="${s.id}">${s.name} (${s.filled}/${s.cellCount})</option>`).join('')
        : '<option value="">（无，请新建）</option>';
      if (list.length) { sel.value = list[0].id; await openSheet(sel.value); }
      else { SHEET = null; renderGrid(); }
    }

    async function openSheet(id) {
      if (!id) { SHEET = null; renderGrid(); return; }
      SHEET = await (await api('/api/sprites/' + id)).json();
      REF = null;
      renderGrid();
      renderMeta();
      // 默认选下一空位
      const empty = SHEET.cells.find((c) => !c.imageRef);
      selectCell(empty ? empty.index : (SHEET.cells[0] ? SHEET.cells[0].index : null));
    }

    function renderMeta() {
      if (!SHEET) { $('sheetTitle').textContent = '—'; $('sheetMeta').textContent = ''; return; }
      $('sheetTitle').textContent = SHEET.name;
      $('sheetMeta').textContent = `cellSize ${SHEET.cellSize} · ${SHEET.cols}×${SHEET.rows}`;
    }

    function renderGrid() {
      const g = $('grid');
      if (!SHEET) { g.innerHTML = ''; return; }
      g.style.gridTemplateColumns = `repeat(${SHEET.cols}, var(--cs))`;
      g.style.setProperty('--cs', Math.max(32, Math.min(96, SHEET.cellSize * 2)) + 'px');
      g.innerHTML = SHEET.cells.map((c) => {
        const img = c.imageRef ? `<img src="${cellUrl(SHEET.id, c.index)}" alt="">` : '';
        return `<div class="cell ${c.imageRef ? 'filled' : ''}" data-i="${c.index}">
          <span class="idx">${c.index}</span>${img}</div>`;
      }).join('');
      applyHighlights();
      g.querySelectorAll('.cell').forEach((el) => {
        const i = Number(el.dataset.i);
        el.onmousedown = (e) => {
          e.preventDefault();
          dragging = true; dragMoved = false; dragStart = i;
          selectCell(i); REGION = null; applyHighlights();
        };
        el.onmouseenter = (e) => {
          if (dragging && dragStart !== null) {
            dragMoved = true;
            setRegion(dragStart, i);
            applyHighlights();
          }
          showPreview(i, e);
        };
        el.onmousemove = movePreview;
        el.onmouseleave = hidePreview;
      });
    }

    function applyHighlights() {
      if (!SHEET) return;
      document.querySelectorAll('#grid .cell').forEach((el) => {
        const i = Number(el.dataset.i);
        const cell = SHEET.cells.find((c) => c.index === i);
        el.classList.toggle('selected', i === SEL);
        const inRegion = REGION &&
          cell.col >= REGION.c0 && cell.col <= REGION.c1 &&
          cell.row >= REGION.r0 && cell.row <= REGION.r1;
        el.classList.toggle('region', !!inRegion);
      });
    }
    function setRegion(a, b) {
      const ca = SHEET.cells.find((c) => c.index === a);
      const cb = SHEET.cells.find((c) => c.index === b);
      REGION = {
        c0: Math.min(ca.col, cb.col), c1: Math.max(ca.col, cb.col),
        r0: Math.min(ca.row, cb.row), r1: Math.max(ca.row, cb.row),
      };
    }
    function regionCells() {
      if (!REGION) return [];
      return SHEET.cells.filter((c) =>
        c.col >= REGION.c0 && c.col <= REGION.c1 &&
        c.row >= REGION.r0 && c.row <= REGION.r1);
    }
    function updateSelInfo() {
      if (REGION) {
        const C = REGION.c1 - REGION.c0 + 1, R = REGION.r1 - REGION.r0 + 1;
        $('selInfo').textContent = `区域 ${C}×${R}（${C * R} 格）`;
      } else if (SEL !== null) {
        const cell = SHEET.cells.find((c) => c.index === SEL);
        $('selInfo').textContent = `格子 ${SEL} (${cell.col},${cell.row})`;
      } else {
        $('selInfo').textContent = '未选';
      }
    }

    function selectCell(i) {
      SEL = i;
      REGION = null;
      renderGrid();
      const cell = SHEET.cells.find((c) => c.index === i);
      $('selInfo').textContent = `格子 ${i} (${cell.col},${cell.row})`;
      $('tagEdit').value = cell.tag || '';
    }

    async function getImageDataUrl(url) {
      const blob = await (await fetch(url)).blob();
      return await new Promise((res) => {
        const r = new FileReader();
        r.onload = () => res(r.result);
        r.readAsDataURL(blob);
      });
    }

    function currentRefMode() {
      return document.querySelector('input[name=ref]:checked').value;
    }

    function currentAssetKind() {
      return document.querySelector('input[name=assetKind]:checked').value;
    }

    async function resolveReference() {
      const mode = currentRefMode();
      if (mode === 'upload') {
        const f = $('refUpload').files[0];
        if (!f) return null;
        return await new Promise((res) => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(f); });
      }
      if (mode === 'sub') return REF; // chosen from subPick
      if (mode === 'none') return false; // 显式无参考图
      return null; // auto -> backend decides by assetKind
    }

    function renderSubPick() {
      const box = $('subPick');
      const filled = SHEET.cells.filter((c) => c.imageRef);
      box.innerHTML = filled.length
        ? filled.map((c) => `<img src="${cellUrl(SHEET.id, c.index)}" data-i="${c.index}" style="width:48px;height:48px;object-fit:contain;image-rendering:pixelated;cursor:pointer;border:2px solid var(--border);border-radius:6px" title="格子${c.index}">`).join('')
        : '<span class="muted">本图暂无子图</span>';
      box.querySelectorAll('img').forEach((im) => {
        im.onclick = async () => {
          REF = await getImageDataUrl(im.src);
          box.querySelectorAll('img').forEach((x) => (x.style.borderColor = 'var(--border)'));
          im.style.borderColor = 'var(--accent)';
        };
      });
    }

    document.querySelectorAll('input[name=ref]').forEach((r) => {
      r.onchange = () => {
        $('refUpload').style.display = r.value === 'upload' ? 'block' : 'none';
        $('subPick').style.display = r.value === 'sub' ? 'flex' : 'none';
        if (r.value === 'sub') renderSubPick();
      };
    });

    // 框选结束：拖动结束且未移动则为单击（REGION 置空）
    document.addEventListener('mouseup', () => {
      if (!dragging) return;
      dragging = false;
      if (!dragMoved) REGION = null;
      updateSelInfo();
    });

    async function generate(mode) {
      if (REGION) { await generateRegion(); return; }
      if (SEL === null) { $('opStatus').textContent = '请先选择一个格子'; return; }
      const prompt = $('prompt').value.trim();
      if (!prompt) { $('opStatus').textContent = '请填写提示词'; return; }
      $('opStatus').textContent = '生成中…';
      const reference = await resolveReference();
      const seed = $('seed').value ? Number($('seed').value) : undefined;
      const assetKind = currentAssetKind();
      const r = await api(`/api/sprites/${SHEET.id}/cells/${SEL}/${mode === 'replace' ? 'replace' : 'generate'}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, reference, seed, assetKind }),
      });
      const j = await r.json();
      if (!j.ok) { $('opStatus').textContent = '失败：' + (j.error || ''); return; }
      SHEET = j.meta;
      renderGrid();
      const cell = SHEET.cells.find((c) => c.index === SEL);
      $('tagEdit').value = cell.tag || '';
      $('opStatus').textContent = '完成 ✓ 已自动写入 Tag';
      // 自动跳到下一个空位
      const next = SHEET.cells.find((c) => !c.imageRef);
      if (next) selectCell(next.index);
    }

    // 计算 MINIMAX 合法尺寸（[512,2048] 且 8 的倍数），保持宽高比
    function chooseSize(W, H) {
      const longSide = 1024;
      const ratio = W / H;
      let w = ratio >= 1 ? longSide : Math.round(longSide * ratio);
      let h = ratio >= 1 ? Math.round(longSide / ratio) : longSide;
      if (w < 512) { const s = 512 / w; w = 512; h = Math.round(h * s); }
      if (h < 512) { const s = 512 / h; h = 512; w = Math.round(w * s); }
      if (w > 2048) { const s = 2048 / w; w = 2048; h = Math.round(h * s); }
      if (h > 2048) { const s = 2048 / h; h = 2048; w = Math.round(h * s); }
      return { w: Math.round(w / 8) * 8, h: Math.round(h / 8) * 8 };
    }

    // 跨格大图：生成一张大图后切片铺满选中区域
    async function generateRegion() {
      const C = REGION.c1 - REGION.c0 + 1, R = REGION.r1 - REGION.r0 + 1;
      const cs = SHEET.cellSize;
      const W = C * cs, H = R * cs;
      const prompt = $('prompt').value.trim();
      if (!prompt) { $('opStatus').textContent = '请填写提示词'; return; }
      $('opStatus').textContent = `生成大图 (${C}×${R}) 中…`;
      const reference = await resolveReference();
      const seed = $('seed').value ? Number($('seed').value) : undefined;
      const assetKind = currentAssetKind();
      const { w, h } = chooseSize(W, H);
      const r = await api(`/api/sprites/${SHEET.id}/generate-raw`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, reference, seed, width: w, height: h, assetKind }),
      });
      const j = await r.json();
      if (!j.image) { $('opStatus').textContent = '失败：' + (j.error || '无图'); return; }
      const img = new Image();
      img.src = 'data:image/png;base64,' + j.image;
      await img.decode();
      const big = document.createElement('canvas');
      big.width = W; big.height = H;
      const bctx = big.getContext('2d');
      bctx.imageSmoothingEnabled = false;
      bctx.drawImage(img, 0, 0, W, H);
      for (const cell of regionCells()) {
        const cc = document.createElement('canvas');
        cc.width = cs; cc.height = cs;
        const cctx = cc.getContext('2d');
        cctx.imageSmoothingEnabled = false;
        const sx = (cell.col - REGION.c0) * cs;
        const sy = (cell.row - REGION.r0) * cs;
        cctx.drawImage(big, sx, sy, cs, cs, 0, 0, cs, cs);
        const b64 = cc.toDataURL('image/png').split(',')[1];
        await api(`/api/sprites/${SHEET.id}/cells/${cell.index}/image`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: b64, tag: `${assetKind === 'tile' ? '地块' : '非地块'}：${prompt}` }),
        });
      }
      SHEET = await (await api('/api/sprites/' + SHEET.id)).json();
      REGION = null;
      renderGrid();
      updateSelInfo();
      $('opStatus').textContent = `完成 ✓ 已铺满 ${C}×${R} 区域（${C * R} 格）`;
    }

    $('genBtn').onclick = () => generate('generate');
    $('replaceBtn').onclick = () => generate('replace');
    $('delBtn').onclick = async () => {
      const targets = REGION ? regionCells().map((c) => c.index) : (SEL !== null ? [SEL] : []);
      if (!targets.length) return;
      for (const i of targets) {
        const r = await api(`/api/sprites/${SHEET.id}/cells/${i}`, { method: 'DELETE' });
        const j = await r.json();
        if (j.ok) SHEET = j.meta;
      }
      REGION = null;
      renderGrid();
      updateSelInfo();
      $('tagEdit').value = '';
      $('opStatus').textContent = '已删除';
    };
    $('saveTagBtn').onclick = async () => {
      if (SEL === null) return;
      const r = await api(`/api/sprites/${SHEET.id}/cells/${SEL}/tag`, {
        method: 'PUT', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tag: $('tagEdit').value }),
      });
      const j = await r.json();
      if (j.ok) { SHEET = j.meta; $('opStatus').textContent = 'Tag 已保存'; }
    };

    // 最小 zip 写入器（store 法，无压缩），无需依赖
    function crc32(buf) {
      let table = crc32._t;
      if (!table) {
        table = crc32._t = new Uint32Array(256);
        for (let n = 0; n < 256; n++) {
          let c = n;
          for (let k = 0; k < 8; k++) c = c & 1 ? 0xEDB88320 ^ (c >>> 1) : c >>> 1;
          table[n] = c >>> 0;
        }
      }
      let crc = 0xFFFFFFFF;
      for (let i = 0; i < buf.length; i++) crc = (crc >>> 8) ^ table[(crc ^ buf[i]) & 0xFF];
      return (crc ^ 0xFFFFFFFF) >>> 0;
    }
    function makeZip(files) {
      const enc = new TextEncoder();
      const chunks = [];
      const central = [];
      let offset = 0;
      for (const f of files) {
        const nameBytes = enc.encode(f.name);
        const data = f.data instanceof Uint8Array ? f.data : enc.encode(f.data);
        const crc = crc32(data);
        const lh = new DataView(new ArrayBuffer(30));
        lh.setUint32(0, 0x04034b50, true);
        lh.setUint16(4, 20, true); lh.setUint16(6, 0, true); lh.setUint16(8, 0, true);
        lh.setUint16(10, 0, true); lh.setUint16(12, 0, true);
        lh.setUint32(14, crc, true); lh.setUint32(18, data.length, true); lh.setUint32(22, data.length, true);
        lh.setUint16(26, nameBytes.length, true); lh.setUint16(28, 0, true);
        chunks.push(new Uint8Array(lh.buffer), nameBytes, data);
        const ch = new DataView(new ArrayBuffer(46));
        ch.setUint32(0, 0x02014b50, true);
        ch.setUint16(4, 20, true); ch.setUint16(6, 20, true); ch.setUint16(8, 0, true);
        ch.setUint16(10, 0, true); ch.setUint16(12, 0, true); ch.setUint16(14, 0, true);
        ch.setUint32(16, crc, true); ch.setUint32(20, data.length, true); ch.setUint32(24, data.length, true);
        ch.setUint16(28, nameBytes.length, true); ch.setUint16(30, 0, true); ch.setUint16(32, 0, true);
        ch.setUint16(34, 0, true); ch.setUint16(36, 0, true); ch.setUint32(38, 0, true);
        ch.setUint32(42, offset, true);
        central.push(new Uint8Array(ch.buffer), nameBytes);
        offset += 30 + nameBytes.length + data.length;
      }
      const centralSize = central.reduce((s, c) => s + c.length, 0);
      const end = new DataView(new ArrayBuffer(22));
      end.setUint32(0, 0x06054b50, true); end.setUint16(4, 0, true); end.setUint16(6, 0, true);
      end.setUint16(8, files.length, true); end.setUint16(10, files.length, true);
      end.setUint32(12, centralSize, true); end.setUint32(16, offset, true); end.setUint16(20, 0, true);
      return new Blob([...chunks, ...central, new Uint8Array(end.buffer)], { type: 'application/zip' });
    }

    $('exportBtn').onclick = async () => {
      if (!SHEET) return;
      const cs = SHEET.cellSize;
      const cv = document.createElement('canvas');
      cv.width = SHEET.cols * cs; cv.height = SHEET.rows * cs;
      const ctx = cv.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      for (const c of SHEET.cells) {
        if (!c.imageRef) continue;
        const img = new Image();
        img.src = cellUrl(SHEET.id, c.index);
        await img.decode();
        ctx.drawImage(img, c.col * cs, c.row * cs, cs, cs);
      }
      const pngBlob = await new Promise((r) => cv.toBlob(r, 'image/png'));
      const pngBytes = new Uint8Array(await pngBlob.arrayBuffer());

      const meta = await (await api('/api/sprites/' + SHEET.id)).json();
      const skillText = await (await api('/api/sprites/' + SHEET.id + '/skill')).text().catch(() => '');

      const folder = (SHEET.name || 'sheet').replace(/[\\/:*?"<>|]/g, '_');
      const zip = makeZip([
        { name: `${folder}/${folder}.png`, data: pngBytes },
        { name: `${folder}/meta.json`, data: JSON.stringify(meta, null, 2) },
        { name: `${folder}/SKILL.md`, data: skillText },
      ]);
      const a = document.createElement('a');
      a.download = `${folder}.zip`;
      a.href = URL.createObjectURL(zip);
      a.click();
      URL.revokeObjectURL(a.href);
    };

    $('skillBtn').onclick = () => { if (SHEET) window.open(`/api/sprites/${SHEET.id}/skill`, '_blank'); };

    // 新建
    $('newBtn').onclick = () => { $('newForm').style.display = 'block'; };
    $('createBtn').onclick = async () => {
      const r = await api('/api/sprites', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: $('newName').value, cellSize: $('newCell').value,
          cols: $('newCols').value, rows: $('newRows').value,
        }),
      });
      const j = await r.json();
      if (j.id) { $('newForm').style.display = 'none'; await loadSheets(); }
    };
    $('refreshBtn').onclick = loadSheets;
    $('sheetSel').onchange = (e) => openSheet(e.target.value);

    (async () => {
      const c = await (await api('/api/config')).json();
      if (!c.hasKey) $('cfgWarn').style.display = 'block';
      await loadSheets();
    })();
  </script>
</body>
</html>
