<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>行走图生成 · RPG Unit Spawner</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <nav>
    <a href="/">首页</a>
    <a href="/config.html">配置</a>
    <a href="/sprite.html">精灵图生成</a>
    <a href="/walk.html" class="active">行走图生成</a>
  </nav>
  <div class="container">
    <h1>行走图生成</h1>
    <div id="cfgWarn" class="card err" style="display:none">未配置 MINIMAX，请先到 <a href="/config.html" style="color:var(--accent)">配置页</a> 填写 API Key。</div>

    <div class="card">
      <p class="muted">基础版：通过提示词生成角色行走图。默认产出一张含多方向/多帧的像素行走表，可下载后按网格切片使用。</p>

      <label>角色描述</label>
      <textarea id="prompt" placeholder="如：像素风勇士，蓝衣，4 方向（下/左/右/上）各 3 帧行走动画，等距网格排列，透明背景"></textarea>

      <div class="row">
        <div style="flex:1"><label>方向数</label>
          <select id="dirs"><option>4</option><option>8</option></select></div>
        <div style="flex:1"><label>每方向帧数</label>
          <select id="frames"><option>3</option><option>4</option></select></div>
        <div style="flex:1"><label>单帧像素</label>
          <input id="cell" type="number" value="32" min="8" /></div>
      </div>

      <label>随机种子（可选）</label>
      <input id="seed" type="number" placeholder="如：12345" />

      <div class="row" style="margin-top:12px">
        <button id="genBtn">生成行走图</button>
      </div>
      <div id="status" class="muted" style="margin-top:8px"></div>
    </div>

    <div class="card">
      <h2 style="margin-top:0">结果</h2>
      <div id="results" class="row"></div>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    async function gen() {
      const base = $('prompt').value.trim();
      if (!base) { $('status').textContent = '请填写角色描述'; return; }
      const prompt = `${base}。方向数 ${$('dirs').value}，每方向 ${$('frames').value} 帧，单帧约 ${$('cell').value}px，像素艺术，等距网格，透明背景。`;
      const seed = $('seed').value ? Number($('seed').value) : undefined;
      $('status').textContent = '生成中…';
      const r = await fetch('/api/generate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt, seed, n: 1 }),
      });
      const j = await r.json();
      if (!j.images) { $('status').textContent = '失败：' + (j.error || ''); return; }
      $('results').innerHTML = j.images.map((b) => `<img src="data:image/png;base64,${b}" style="width:256px;height:256px;object-fit:contain;image-rendering:pixelated;border:1px solid var(--border);border-radius:8px">`).join('');
      $('status').textContent = '完成 ✓';
    }
    $('genBtn').onclick = gen;

    (async () => {
      const c = await (await fetch('/api/config')).json();
      if (!c.hasKey) $('cfgWarn').style.display = 'block';
    })();
  </script>
</body>
</html>
