<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>行走图生成 · RPG Unit Spawner</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .walk-card{width:190px;padding:10px;position:relative}
    .walk-thumb{width:170px;height:170px;object-fit:contain;image-rendering:pixelated;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,.02)}
    .walk-title{font-size:12px;margin-top:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .walk-sub{font-size:12px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .walk-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}.walk-actions button{font-size:12px;padding:5px 8px}
    .walk-preview{position:fixed;z-index:6000;display:none;pointer-events:none;background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:10px;box-shadow:0 14px 48px rgba(0,0,0,.55)}
    .walk-preview img{width:360px;height:360px;object-fit:contain;image-rendering:pixelated;display:block}.walk-preview div{margin-top:6px;font-size:12px;color:var(--muted);max-width:360px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .sheet-note{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px;margin-top:8px}.sheet-note .card{padding:10px}
  </style>
</head>
<body>
  <nav>
    <a href="/">首页</a>
    <a href="/config.html">配置</a>
    <a href="/sprite.html">精灵图生成</a>
    <a href="/walk.html" class="active">行走图生成</a>
  </nav>
  <div class="container">
    <h1>行走图生成</h1>
    <div id="cfgWarn" class="card err" style="display:none">未配置 MINIMAX，请先到 <a href="/config.html" style="color:var(--accent)">配置页</a> 填写 API Key。</div>

    <div class="card">
      <p class="muted">一次可生成同一角色的多种行走图，也可以只生成其中某一种。参考图默认使用当前项目下第一张行走图，方便保持角色风格一致。</p>

      <label>角色名字</label>
      <input id="characterName" placeholder="如：艾琳" />

      <label>角色描述</label>
      <textarea id="prompt" placeholder="如：像素风勇士，蓝衣，棕色短发，小披风"></textarea>

      <label>固定规格</label>
      <div class="sheet-note">
        <div class="card"><strong>A. 移动行走图</strong><div class="muted">4 × 4（4方向，每方向4帧）</div></div>
        <div class="card"><strong>B. 攻击行走图</strong><div class="muted">1 × 6（单排6帧）</div></div>
        <div class="card"><strong>C. 受击行走图</strong><div class="muted">1 × 3（单排3帧）</div></div>
      </div>

      <input id="dirs" type="hidden" value="4" />
      <input id="frames" type="hidden" value="4" />

      <label>单帧像素</label>
      <input id="cell" type="number" value="32" min="8" />

      <label>参考图</label>
      <div class="row">
        <label style="margin:0"><input type="radio" name="ref" value="auto" checked style="width:auto;margin-right:6px" />自动（当前项目第一张行走图）</label>
        <label style="margin:0"><input type="radio" name="ref" value="upload" style="width:auto;margin-right:6px" />上传</label>
        <label style="margin:0"><input type="radio" name="ref" value="existing" style="width:auto;margin-right:6px" />选当前项目行走图</label>
        <label style="margin:0"><input type="radio" name="ref" value="none" style="width:auto;margin-right:6px" />无</label>
      </div>
      <input id="refUpload" type="file" accept="image/*" style="display:none;margin-top:8px" />
      <div id="walkPick" class="row" style="display:none;margin-top:8px"></div>

      <label>随机种子（可选）</label>
      <input id="seed" type="number" placeholder="如：12345" />

      <div class="row" style="margin-top:12px;flex-wrap:wrap">
        <button id="genBtn">生成全部三种</button>
        <button class="ghost" id="genMoveBtn">只生成移动</button>
        <button class="ghost" id="genAttackBtn">只生成攻击</button>
        <button class="ghost" id="genHurtBtn">只生成受击</button>
        <button class="ghost" id="refreshWalks">刷新行走图库</button>
      </div>
      <div id="status" class="muted" style="margin-top:8px"></div>
    </div>

    <div class="card">
      <h2 style="margin-top:0">结果</h2>
      <div id="results" class="row"></div>
    </div>

    <div class="card">
      <h2 style="margin-top:0">当前项目行走图库</h2>
      <p class="muted">鼠标悬浮缩略图可查看大图；可对已保存行走图重命名或删除。</p>
      <div id="walkList" class="row"></div>
    </div>
  </div>
  <div id="walkPreview" class="walk-preview"><img id="walkPreviewImg" /><div id="walkPreviewTitle"></div></div>

  <script src="/project.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    let WALKS = [];
    let REF = null;
    const ACTION_META = {
      move: { label: '移动行走图' },
      attack: { label: '攻击行走图' },
      hurt: { label: '受击行走图' },
    };

    function api(url, opt) { return Project.fetch(url, opt); }
    function walkImageUrl(id) { return Project.withProject(`/api/walks/${id}/image?t=${Date.now()}`); }
    function esc(s) { return String(s || '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
    function actionLabel(type) { return ACTION_META[type]?.label || type || '未分类'; }

    async function dataUrlFromFile(file) {
      return await new Promise((res) => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(file); });
    }
    async function dataUrlFromUrl(url) {
      const blob = await (await fetch(url)).blob();
      return await new Promise((res) => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(blob); });
    }

    async function loadWalks() {
      const list = await (await api('/api/walks')).json();
      WALKS = Array.isArray(list) ? list : [];
      renderWalkList();
      if (document.querySelector('input[name=ref]:checked')?.value === 'existing') renderWalkPick();
    }

    function placePreview(e) {
      const p = $('walkPreview');
      const pad = 16;
      let x = e.clientX + pad;
      let y = e.clientY + pad;
      const r = p.getBoundingClientRect();
      if (x + r.width > innerWidth - 8) x = e.clientX - r.width - pad;
      if (y + r.height > innerHeight - 8) y = innerHeight - r.height - 8;
      p.style.left = Math.max(8, x) + 'px';
      p.style.top = Math.max(8, y) + 'px';
    }

    function bindPreview(root = document) {
      root.querySelectorAll('.walk-thumb').forEach((img) => {
        img.onmouseenter = (e) => {
          $('walkPreviewImg').src = img.src;
          $('walkPreviewTitle').textContent = img.dataset.title || '';
          $('walkPreview').style.display = 'block';
          placePreview(e);
        };
        img.onmousemove = placePreview;
        img.onmouseleave = () => { $('walkPreview').style.display = 'none'; };
      });
    }

    function renderWalkCard(w, pickable = false) {
      const url = walkImageUrl(w.id);
      const title = w.name || `${w.characterName || '未命名角色'} · ${actionLabel(w.actionType)}`;
      const sub = `${w.characterName || '未命名角色'} · ${actionLabel(w.actionType)} · ${w.dirs}×${w.frames}`;
      return `<div class="card walk-card" data-id="${esc(w.id)}">
        <img class="walk-thumb" src="${url}" data-id="${esc(w.id)}" data-title="${esc(title)}" style="${pickable ? 'cursor:pointer' : ''}">
        <div class="muted walk-title" title="${esc(title)}">${esc(title)}</div>
        <div class="walk-sub" title="${esc(sub)}">${esc(sub)}</div>
        ${pickable ? '' : `<div class="walk-actions"><button class="ghost rename-walk" data-id="${esc(w.id)}">重命名</button><button class="ghost delete-walk" data-id="${esc(w.id)}">删除</button></div>`}
      </div>`;
    }

    function renderWalkList() {
      $('walkList').innerHTML = WALKS.length ? WALKS.map((w) => renderWalkCard(w)).join('') : '<span class="muted">当前项目暂无行走图。</span>';
      bindWalkActions($('walkList'));
      bindPreview($('walkList'));
    }

    function renderWalkPick() {
      const box = $('walkPick');
      box.innerHTML = WALKS.length ? WALKS.map((w) => renderWalkCard(w, true)).join('') : '<span class="muted">当前项目暂无可选行走图。</span>';
      box.querySelectorAll('img').forEach((img) => {
        img.onclick = async () => {
          REF = await dataUrlFromUrl(img.src);
          box.querySelectorAll('img').forEach((x) => (x.style.borderColor = 'var(--border)'));
          img.style.borderColor = 'var(--accent)';
        };
      });
      bindPreview(box);
    }

    function bindWalkActions(root) {
      root.querySelectorAll('.rename-walk').forEach((btn) => {
        btn.onclick = async () => {
          const id = btn.dataset.id;
          const w = WALKS.find((x) => x.id === id);
          const name = prompt('新的行走图名称', w?.name || `${w?.characterName || ''} · ${actionLabel(w?.actionType)}`);
          if (!name || !name.trim()) return;
          const r = await api(`/api/walks/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: name.trim() }) });
          const j = await r.json();
          if (!j.ok) { $('status').textContent = '重命名失败：' + (j.error || ''); return; }
          $('status').textContent = '已重命名';
          await loadWalks();
        };
      });
      root.querySelectorAll('.delete-walk').forEach((btn) => {
        btn.onclick = async () => {
          const id = btn.dataset.id;
          const w = WALKS.find((x) => x.id === id);
          if (!confirm(`删除行走图「${w?.name || w?.characterName || id}」？此操作不可恢复。`)) return;
          const r = await api(`/api/walks/${id}`, { method: 'DELETE' });
          const j = await r.json();
          if (!j.ok) { $('status').textContent = '删除失败：' + (j.error || ''); return; }
          if (REF && document.querySelector('input[name=ref]:checked')?.value === 'existing') REF = null;
          $('status').textContent = '已删除';
          await loadWalks();
        };
      });
    }

    function renderResults(items) {
      $('results').innerHTML = items.map((item) => {
        const url = walkImageUrl(item.meta.id);
        const title = `${item.meta.characterName || ''} · ${actionLabel(item.actionType)}`;
        return `<div class="card walk-card"><img class="walk-thumb" src="${url}" data-title="${esc(title)}"><div class="walk-title">${esc(title)}</div><div class="walk-sub">${item.sheet?.dirs || item.meta.dirs}×${item.sheet?.frames || item.meta.frames}</div></div>`;
      }).join('');
      bindPreview($('results'));
    }

    document.querySelectorAll('input[name=ref]').forEach((r) => {
      r.onchange = () => {
        const mode = document.querySelector('input[name=ref]:checked').value;
        $('refUpload').style.display = mode === 'upload' ? 'block' : 'none';
        $('walkPick').style.display = mode === 'existing' ? 'flex' : 'none';
        if (mode === 'existing') renderWalkPick();
      };
    });

    async function resolveReference() {
      const mode = document.querySelector('input[name=ref]:checked').value;
      if (mode === 'upload') {
        const f = $('refUpload').files[0];
        return f ? await dataUrlFromFile(f) : null;
      }
      if (mode === 'existing') return REF;
      if (mode === 'none') return false;
      return null;
    }

    async function gen(actionType) {
      const characterName = $('characterName').value.trim();
      const prompt = $('prompt').value.trim();
      if (!characterName) { $('status').textContent = '请填写角色名字'; return; }
      const seed = $('seed').value ? Number($('seed').value) : undefined;
      const cellSize = Number($('cell').value) || 32;
      const reference = await resolveReference();
      $('status').textContent = actionType === 'all' ? '正在依次生成全部三种行走图…' : `正在生成${actionLabel(actionType)}…`;
      const r = await api('/api/walks/generate', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ characterName, prompt, reference, seed, cellSize, actionType }),
      });
      const j = await r.json();
      if (!j.ok) { $('status').textContent = '失败：' + (j.error || ''); return; }
      const items = Array.isArray(j.items) ? j.items : [j];
      renderResults(items);
      $('status').textContent = actionType === 'all' ? '完成 ✓ 已生成并保存三种行走图' : `完成 ✓ 已保存${actionLabel(actionType)}`;
      await loadWalks();
    }

    $('genBtn').onclick = () => gen('all');
    $('genMoveBtn').onclick = () => gen('move');
    $('genAttackBtn').onclick = () => gen('attack');
    $('genHurtBtn').onclick = () => gen('hurt');
    $('refreshWalks').onclick = loadWalks;

    (async () => {
      const pid = await Project.init({ requireProject: true });
      if (!pid) return;
      const c = await (await fetch('/api/config')).json();
      if (!c.hasKey) $('cfgWarn').style.display = 'block';
      await loadWalks();
    })();
  </script>
</body>
</html>
