<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>配置 · RPG Unit Spawner</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <nav>
    <a href="/">首页</a>
    <a href="/config.html" class="active">配置</a>
    <a href="/sprite.html">精灵图生成</a>
  </nav>
  <div class="container">
    <h1>服务商配置</h1>
    <div class="card">
      <p class="muted">当前仅支持 <strong>MINIMAX</strong>。API Key 仅保存在服务端（data/config.json，已 gitignore），不会下发到前端。项目数据互相隔离，但服务商配置全局共享。</p>

      <label>服务商</label>
      <input value="MINIMAX" disabled />

      <label>API 接入区域（Base URL）</label>
      <select id="baseUrl">
        <option value="https://api.minimax.io">国际站 https://api.minimax.io</option>
        <option value="https://api.minimaxi.com">国内站 https://api.minimaxi.com</option>
      </select>

      <label>模型</label>
      <select id="model"></select>

      <label>API Key</label>
      <input id="apiKey" placeholder="填入 MINIMAX API Key；留空则保留现有 Key" />
      <div class="muted" id="keyInfo"></div>

      <div class="row" style="margin-top:12px">
        <button id="saveBtn">保存配置</button>
        <button id="testBtn" class="ghost">测试 Key</button>
        <span id="status" class="muted"></span>
      </div>
    </div>
  </div>

  <script src="/project.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    async function load() {
      await Project.init({ requireProject: false });
      const c = await (await fetch('/api/config')).json();
      $('baseUrl').value = c.baseUrl || 'https://api.minimax.io';
      $('model').innerHTML = c.models.map((m) => `<option ${m === c.model ? 'selected' : ''}>${m}</option>`).join('');
      $('keyInfo').textContent = c.hasKey ? `已保存 Key：${c.apiKeyMask}` : '尚未保存 API Key';
    }
    $('saveBtn').onclick = async () => {
      $('status').textContent = '保存中…';
      const body = { api_key: $('apiKey').value.trim(), model: $('model').value, base_url: $('baseUrl').value };
      const r = await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
      const j = await r.json();
      $('status').textContent = j.ok ? '已保存 ✓' : '失败：' + (j.error || '');
      await load();
    };
    $('testBtn').onclick = async () => {
      $('status').textContent = '测试中…';
      const r = await fetch('/api/config/test', { method: 'POST' });
      const j = await r.json();
      $('status').textContent = j.ok ? 'Key 有效 ✓' : '失败：' + (j.error || '');
    };
    load();
  </script>
</body>
</html>
